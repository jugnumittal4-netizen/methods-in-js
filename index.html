<!DOCTYPE html>
<html>

<body>
    
    <h2>loops in js</h2>
    <p>basic loops;</p>
    <p id = demo </p>
    <script>
        var fruits = ["Banana", "Orange", "Apple", "Mango", "Kiwi", "Pineapple", "Grapes", "Strawberry", "Watermelon", "Cherry", "Peach", "Pear", "Plum", "Apricot", "Avocado", "Blueberry", "Coconut", "Fig", "Guava", "Lemon", "Lime"];
        var text = "";
        var i;
        for (i = 0; i < fruits.length; i++) {
            text +=  fruits[i] + "<br>";
        }
        document.getElementById("demo").innerHTML = text;
        </script>
</body>
</html>
